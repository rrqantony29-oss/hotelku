services:
  - type: web
    name: hotelku-backend
    runtime: php
    buildCommand: cd backend && composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache
    startCommand: cd backend && php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /opt/render/project/src/backend/database/database.sqlite
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/database
      sizeGB: 1
