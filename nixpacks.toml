[phases.setup]
nixPkgs = ["...", "php83", "php83Extensions.sqlite3", "php83Extensions.mbstring", "php83Extensions.bcmath", "php83Extensions.curl", "php83Extensions.zip"]

[phases.install]
cmds = ["cd backend && composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["cd backend && php artisan config:cache && php artisan route:cache"]

[start]
cmd = "cd backend && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host 0.0.0.0 --port $PORT"

[variables]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "stderr"
SESSION_DRIVER = "cookie"
